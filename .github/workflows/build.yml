name: Build & Package

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── macOS (ARM64 + Intel) ────────────────────────────────────────────
  build-macos:
    name: macOS (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: thinkflow/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        working-directory: thinkflow
        run: npm ci

      - name: Build Tauri app
        working-directory: thinkflow
        run: npx tauri build --target ${{ matrix.target }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: thinkflow-macos-${{ matrix.target }}
          path: |
            thinkflow/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: warn

  # ── Windows (x86_64) ─────────────────────────────────────────────────
  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: thinkflow/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: thinkflow
        run: npm ci

      - name: Build Tauri app
        working-directory: thinkflow
        run: npx tauri build

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: thinkflow-windows-x86_64
          path: |
            thinkflow/src-tauri/target/release/bundle/msi/*.msi
            thinkflow/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  # ── GitHub Release (tag pushes only) ─────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: thinkflow-macos-aarch64-apple-darwin
          path: artifacts/macos-arm64

      - name: Download macOS Intel artifact
        uses: actions/download-artifact@v4
        with:
          name: thinkflow-macos-x86_64-apple-darwin
          path: artifacts/macos-intel

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: thinkflow-windows-x86_64
          path: artifacts/windows

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f -exec sha256sum {} \; > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ThinkFlow ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*
