name: Build & Package

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── macOS (ARM64 + Intel) ────────────────────────────────────────────
  build-macos:
    name: macOS (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: thinkflow/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Create seed database
        run: bash scripts/create_seed_db.sh

      - name: Verify seed database exists
        run: test -f thinkflow/seed/thinkflow.db || (echo "ERROR: seed DB not created" && exit 1)

      - name: Install frontend dependencies
        working-directory: thinkflow
        run: npm ci

      - name: Build Tauri app
        working-directory: thinkflow
        run: npx tauri build --target ${{ matrix.target }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: thinkflow-macos-${{ matrix.target }}
          path: |
            thinkflow/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: warn

  # ── Windows (x86_64) ─────────────────────────────────────────────────
  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: thinkflow/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Create seed database (Python)
        run: python scripts/create_seed_db.py

      - name: Verify seed database exists
        run: test -f thinkflow/seed/thinkflow.db || (echo "ERROR: seed DB not created" && exit 1)

      - name: Install frontend dependencies
        working-directory: thinkflow
        run: npm ci

      - name: Build Tauri app
        working-directory: thinkflow
        run: npx tauri build

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: thinkflow-windows-x86_64
          path: |
            thinkflow/src-tauri/target/release/bundle/msi/*.msi
            thinkflow/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
